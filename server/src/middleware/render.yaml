# Render Blueprint — https://render.com/docs/blueprint-spec
#
# One web service serves both the API and the built frontend (see the
# static-file serving in server/src/app.ts), so this is the only service
# needed. Database is NOT declared here — bring your own Postgres
# (Neon free tier, Render's own Postgres, etc.) and paste its connection
# string into DATABASE_URL below when you first deploy.
#
# After connecting this repo in the Render dashboard, it'll prompt for
# every envVar marked `sync: false` — see README.md's "Deploying" section
# for what each one needs to be and how to generate it.
services:
  - type: web
    name: oms-erp
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: REQUIRE_HTTPS
        value: "true"
      - key: SESSION_INACTIVITY_MINUTES
        value: "30"
      - key: BOOTSTRAP_SECRET
        generateValue: true
